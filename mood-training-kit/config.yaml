model:
  backbone: "mobilenetv2"
  pretrained: true
  input_size: 224
  num_classes: 11
  dropout: 0.5
  freeze_backbone_epochs: 3

training:
  batch_size: 64
  epochs: 50
  lr: 0.001
  lr_backbone: 0.0001        # Lower LR for pretrained backbone
  weight_decay: 0.0001
  scheduler: "cosine"
  warmup_epochs: 3
  early_stopping_patience: 10
  label_smoothing: 0.1
  gradient_clip: 1.0
  mixed_precision: true        # torch.cuda.amp

data:
  train_dir: "data/processed/train"
  val_dir: "data/processed/val"
  test_dir: "data/processed/test"
  num_workers: 8
  pin_memory: true
  # Class weights for imbalanced datasets (adjust after analyzing your data)
  class_weights: [1.0, 1.2, 1.1, 1.3, 2.0, 1.4, 1.0, 1.5, 1.2, 1.8, 1.3]
  # Order: happy, sad, angry, excited, romantic, stressed, relaxed, emotional, fearful, bored, energetic

augmentation:
  horizontal_flip: 0.5
  rotation: 15
  brightness: 0.2
  contrast: 0.2
  saturation: 0.2
  hue: 0.05
  cutout:
    enabled: true
    holes: 1
    size: 40
  mixup:
    enabled: true
    alpha: 0.2
  random_erase:
    enabled: true
    probability: 0.3

paths:
  checkpoint_dir: "models/checkpoints"
  log_dir: "logs"
  export_dir: "models/export"

mood_mapping:
  # How to map source dataset labels to your 11 moods
  # Used in preprocess.py when combining multiple datasets
  fer2013:
    0: "angry"      # Anger
    1: "fearful"    # Fear  
    2: "happy"      # Happy
    3: "relaxed"    # Neutral → Relaxed (primary)
    4: "sad"        # Sad
    5: "excited"    # Surprise → Excited (primary)
    6: "stressed"   # Disgust → Stressed (primary)

  affectnet:
    0: "relaxed"    # Neutral
    1: "happy"      # Happy
    2: "sad"        # Sad
    3: "stressed"   # Contempt
    4: "relaxed"    # Neutral variant
    5: "fearful"    # Fear
    6: "angry"      # Anger
    7: "excited"    # Surprise
    8: "emotional"  # Some AffectNet variants have this
    9: "romantic"   # Love/Affection if available
    10: "energetic" # High arousal positive
