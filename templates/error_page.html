<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }}</title>
    <meta name="description" content="{{ page.description }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            font-family: 'Inter', sans-serif;
            color: #fff;
            background:
                radial-gradient(circle at top left, rgba(255,77,109,0.18), transparent 32%),
                radial-gradient(circle at bottom right, rgba(0,212,170,0.14), transparent 30%),
                linear-gradient(180deg, #050509 0%, #0a0a0f 100%);
        }
        .card {
            width: min(720px, calc(100% - 28px));
            padding: 40px;
            border-radius: 28px;
            border: 1px solid rgba(255,255,255,0.08);
            background: rgba(16,18,28,0.9);
            backdrop-filter: blur(18px);
            text-align: center;
            box-shadow: 0 30px 80px rgba(0,0,0,0.45);
        }
        .icon { font-size: 72px; margin-bottom: 18px; }
        h1 {
            margin: 0 0 10px;
            font-family: 'Space Grotesk', sans-serif;
            font-size: clamp(32px, 6vw, 58px);
            letter-spacing: -0.05em;
        }
        p { margin: 0 auto 24px; color: rgba(255,255,255,0.72); line-height: 1.7; max-width: 56ch; }
        a {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 50px;
            padding: 0 20px;
            border-radius: 14px;
            background: linear-gradient(135deg, #ff4d6d, #c81e4e);
            color: #fff;
            text-decoration: none;
            font-weight: 800;
            box-shadow: 0 18px 36px rgba(255,77,109,0.24);
        }
    </style>
</head>
<body>
    <main class="card">
        <div class="icon">🎬</div>
        <h1>Movie not found</h1>
        <p>{{ page.description }}</p>
        <a href="/dashboard">Return Home</a>
    </main>
</body>
</html>
